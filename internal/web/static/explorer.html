<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sourcelex - 代码图谱浏览器</title>
    <link rel="stylesheet" href="/explorer.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/go.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/java.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/typescript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/cpp.min.js"></script>
</head>
<body>
    <!-- Top Navigation Bar -->
    <nav class="topbar">
        <div class="topbar-left">
            <a href="/" class="logo-link">
                <span class="logo">SL</span>
                <span class="brand">Sourcelex</span>
            </a>
            <span class="page-title">代码图谱浏览器</span>
        </div>
        <div class="topbar-center">
            <div class="search-box">
                <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                <input type="text" id="search-input" placeholder="语义搜索函数/类..." />
                <div class="search-results hidden" id="search-results"></div>
            </div>
        </div>
        <div class="topbar-right">
            <div class="stats-bar" id="stats-bar">
                <span class="stat-item" id="stat-nodes">-- 实体</span>
                <span class="stat-item" id="stat-edges">-- 调用</span>
            </div>
        </div>
    </nav>

    <!-- Main Three-Column Layout -->
    <div class="layout">
        <!-- Left: File Tree -->
        <div class="panel panel-left" id="panel-left">
            <div class="panel-header">
                <span class="panel-title">文件浏览器</span>
                <button class="panel-toggle" id="toggle-left" title="收起">◀</button>
            </div>
            <div class="file-tree" id="file-tree">
                <div class="tree-loading">加载中...</div>
            </div>
        </div>

        <!-- Resizer -->
        <div class="resizer resizer-left" id="resizer-left"></div>

        <!-- Center: Call Graph -->
        <div class="panel panel-center" id="panel-center">
            <div class="panel-header">
                <span class="panel-title" id="graph-title">调用图谱</span>
                <div class="graph-toolbar">
                    <select id="graph-type-filter" class="toolbar-select">
                        <option value="all">全部类型</option>
                        <option value="function">函数</option>
                        <option value="class">类/结构体</option>
                        <option value="method">方法</option>
                    </select>
                    <button class="toolbar-btn" id="btn-zoom-fit" title="适应画布">⊞</button>
                    <button class="toolbar-btn" id="btn-zoom-in" title="放大">+</button>
                    <button class="toolbar-btn" id="btn-zoom-out" title="缩小">−</button>
                    <button class="toolbar-btn" id="btn-reset" title="重置">↺</button>
                </div>
            </div>
            <div style="display:flex;gap:14px;padding:2px 12px 4px;font-size:11px;color:#6e7681;align-items:center;">
                <span style="display:flex;align-items:center;gap:4px"><span style="width:16px;height:2px;background:#30363d;display:inline-block"></span>同文件调用</span>
                <span style="display:flex;align-items:center;gap:4px"><span style="width:16px;height:0;border-top:2px dashed #f0883e;display:inline-block"></span>跨文件调用</span>
                <span style="display:flex;align-items:center;gap:4px"><span style="width:8px;height:8px;border-radius:50%;background:#58a6ff;display:inline-block"></span>函数</span>
                <span style="display:flex;align-items:center;gap:4px"><span style="width:8px;height:8px;border-radius:50%;background:#3fb950;display:inline-block"></span>类</span>
                <span style="display:flex;align-items:center;gap:4px"><span style="width:8px;height:8px;border-radius:50%;background:#bc8cff;display:inline-block"></span>方法</span>
            </div>
            <div class="graph-viewport" id="graph-viewport">
                <svg id="graph-svg"></svg>
            </div>
        </div>

        <!-- Resizer -->
        <div class="resizer resizer-right" id="resizer-right"></div>

        <!-- Right: Code Viewer -->
        <div class="panel panel-right" id="panel-right">
            <div class="panel-header">
                <span class="panel-title" id="code-title">代码查看器</span>
                <button class="panel-toggle" id="toggle-right" title="收起">▶</button>
            </div>
            <div class="code-viewer" id="code-viewer">
                <div class="code-placeholder">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3">
                        <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
                    </svg>
                    <p>点击图谱中的节点查看代码</p>
                    <p class="hint">或在左侧文件树中选择文件</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Node Detail Popup (shown on node click) -->
    <div class="node-popup hidden" id="node-popup">
        <div class="popup-header">
            <div class="popup-title" id="popup-title"></div>
            <button class="popup-close" id="popup-close">&times;</button>
        </div>
        <div class="popup-body" id="popup-body"></div>
        <div class="popup-actions">
            <button class="popup-btn" id="popup-view-code">查看代码</button>
            <button class="popup-btn" id="popup-view-callers">查看调用者</button>
            <button class="popup-btn" id="popup-view-callees">查看被调用者</button>
            <button class="popup-btn popup-btn-cross" id="popup-view-chain">跨文件调用链</button>
        </div>
    </div>

    <script src="/explorer.js"></script>
</body>
</html>
