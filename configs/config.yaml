# RepoMind 配置文件
# 对应架构文档第八节：配置文件结构

# 路径配置
paths:
  data_dir: ./data    # 数据存储目录
  temp_dir: ./temp    # 临时文件目录

# Git 配置
git:
  clone_depth: 1      # 浅克隆深度，加速克隆
  # credentials:      # 可选：Git 凭证
  #   username: ""
  #   password: ""

# 向量存储配置
vector_store:
  type: qdrant                                        # faiss, qdrant, milvus
  embedder_type: huggingface                          # huggingface, openai
  chunk_size: 1024                                    # 代码分块大小
  chunk_overlap: 200                                  # 分块重叠
  # HuggingFace 配置
  huggingface:
    api_token: ""                                     # 从 huggingface.co/settings/tokens 获取
    model_id: "sentence-transformers/all-MiniLM-L6-v2" # 嵌入模型
    dimension: 384                                    # 向量维度

# 图存储配置
graph_store:
  type: memory        # memory, cayley, dgraph

# MCP 服务配置
mcp:
  host: 0.0.0.0
  port: 8000

# 日志配置
logging:
  level: info         # debug, info, warn, error
  format: text        # json, text
